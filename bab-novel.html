        /* Style untuk tombol floating navigasi bab */
.floating-nav-bab {
    position: fixed;
    left: 280px;
    bottom: 200px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  /*  z-index: 999; Agar tidak tertutupi konten lain */
}

.floating-nav-btn {
  
    width: 50px;
    height: 50px;
    border-radius: 10%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* Sembunyikan tombol navigasi lama di header card */

        display: none;
    }
}
@media (min-width: 492px) {
    .floating-nav-bab {
        display: none; /* Sembunyikan floating di layar besar jika ingin tombol tetap di header */
    }
}

/* Efek hover untuk link di footer */

/* Responsif untuk footer di layar kecil */

    footer .row {
        text-align: center;
    }
    footer .d-flex.gap-3 {
        justify-content: center;
        margin-top: 10px;
    }

                    </div>
                    
                    
                    <div>
                    
   
    
    </div>

<div class="floating-nav-bab">

    <!-- Link Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Variabel Global
        let kontenSaatIni = "";
        let babAktifIndex = -1;
        const temaKey = "novel-tema";
        const progresKey = "novel-progres";
        
        // Elemen DOM
        const htmlElement = document.documentElement;
        const daftarBabElement = document.getElementById('daftar-bab');
        const judulBabElement = document.getElementById('judul-bab');
        const kontenNovelElement = document.getElementById('konten-novel');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
     //   const clearSearchBtn = document.getElementById('clear-search-btn');
        const searchInfoElement = document.getElementById('search-info');
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const prevBabBtn = document.getElementById('prev-bab-btn');
        const nextBabBtn = document.getElementById('next-bab-btn');
        const progresInfoElement = document.getElementById('progres-info');
        const resetProgresBtn = document.getElementById('reset-progres-btn');

        // Daftar Bab (Sesuaikan dengan file kamu!)
        const daftarBab = [
            { namaFile: 'bab-1.txt', judul: 'Bab 1: Awal Perjalanan' },
            { namaFile: 'bab-2.txt', judul: 'Bab 2: Rahasia di Hutan' },
            { namaFile: 'bab-3.txt', judul: 'Bab 3: Pertemuan Tak Terduga' },
            { namaFile: 'bab-4.txt', judul: 'Bab 4: Perang di Kota Tua' }
        ];

        // --- Fungsi Dark Mode ---
        function initDarkMode() {
            const temaSimpan = localStorage.getItem(temaKey) || "light";
            htmlElement.setAttribute("data-bs-theme", temaSimpan);
            updateDarkModeTombol(temaSimpan);
        }

        function updateDarkModeTombol(tema) {
            if (tema === "dark") {
                darkModeToggle.innerHTML = '<i class="bi bi-sun-fill"></i>';
            } else {
                darkModeToggle.innerHTML = '<i class="bi bi-moon-stars-fill"></i>';
            }
        }

        function toggleDarkMode() {
            const temaSekarang = htmlElement.getAttribute("data-bs-theme");
            const temaBaru = temaSekarang === "light" ? "dark" : "light";
            htmlElement.setAttribute("data-bs-theme", temaBaru);
            localStorage.setItem(temaKey, temaBaru);
            updateDarkModeTombol(temaBaru);
        }

        // --- Fungsi Daftar & Navigasi Bab ---
        function muatDaftarBab() {
            daftarBabElement.innerHTML = "";
            daftarBab.forEach((bab, index) => {
                const li = document.createElement('li');
                li.className = `list-group-item bab-item ${index === babAktifIndex ? 'bab-aktif' : ''}`;
                li.textContent = bab.judul;
                li.addEventListener('click', () => muatKontenBab(index));
                daftarBabElement.appendChild(li);
            });
        }

        function updateNavigasiBab() {
            // Aktifkan/nonaktifkan tombol navigasi
            prevBabBtn.disabled = (babAktifIndex <= 0);
            nextBabBtn.disabled = (babAktifIndex >= daftarBab.length - 1);
            prevBabBtn.classList.toggle('disabled', babAktifIndex <= 0);
            nextBabBtn.classList.toggle('disabled', babAktifIndex >= daftarBab.length - 1);
        }

        // --- Fungsi Fetch & Tampilan Konten ---
        async function muatKontenBab(index) {
            if (index < 0 || index >= daftarBab.length) return;
            
            try {
                const bab = daftarBab[index];
                const response = await fetch(`bab-novel/${bab.namaFile}`);
                if (!response.ok) throw new Error('Bab tidak ditemukan');
                
                // Update variabel global
                kontenSaatIni = await response.text();
                babAktifIndex = index;
                
                // Tampilkan konten
                judulBabElement.textContent = bab.judul;
                tampilkanKonten(kontenSaatIni);
                resetPencarian();
                
                // Update UI
                muatDaftarBab();
                updateNavigasiBab();
                simpanProgresBacaan(index);
                tampilkanProgresBacaan();
            } catch (error) {
                kontenNovelElement.innerHTML = `<p class="text-danger">Error: ${error.message}</p>`;
            }
        }

        function tampilkanKonten(konten) {
            const kontenDiformat = konten.split('\n').filter(baris => baris.trim() !== "").map(baris => `<p>${baris}</p>`).join('');
            kontenNovelElement.innerHTML = kontenDiformat;
        }

        // --- Fungsi Pencarian ---
        function cariKata(kataKunci) {
            if (!kontenSaatIni || kataKunci.trim() === "") {
                resetPencarian();
                return;
            }

            const kataEscape = kataKunci.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${kataEscape})`, 'gi');
            const kontenDenganHighlight = kontenSaatIni.replace(regex, '<span class="search-highlight">$1</span>');
            
            const kontenDiformat = kontenDenganHighlight.split('\n').filter(baris => baris.trim() !== "").map(baris => `<p>${baris}</p>`).join('');
            kontenNovelElement.innerHTML = kontenDiformat;

            const jumlahKemunculan = (kontenSaatIni.match(regex) || []).length;
            searchInfoElement.textContent = jumlahKemunculan > 0 ? `Ditemukan ${jumlahKemunculan} hasil` : 'Tidak ada hasil ditemukan';
        }

        function resetPencarian() {
            searchInput.value = "";
            searchInfoElement.textContent = "";
            tampilkanKonten(kontenSaatIni);
        }

        // --- Fungsi Penyimpanan Progres ---
        function simpanProgresBacaan(index) {
            const progres = {
                index: index,
                judul: daftarBab[index].judul,
                tanggal: new Date().toLocaleDateString('id-ID')
            };
            localStorage.setItem(progresKey, JSON.stringify(progres));
        }

        function tampilkanProgresBacaan() {
            const progresSimpan = JSON.parse(localStorage.getItem(progresKey));
            if (progresSimpan) {
                progresInfoElement.innerHTML = `Terakhir dibaca: <span class="fw-semibold">${progresSimpan.judul} (${progresSimpan.tanggal})</span>`;
                // Muat bab terakhir jika belum ada bab aktif
                if (babAktifIndex === -1) {
                    muatKontenBab(progresSimpan.index);
                }
            } else {
                progresInfoElement.innerHTML = 'Terakhir dibaca: <span class="fw-semibold">- Belum ada data -</span>';
            }
        }

        function resetProgresBacaan() {
            if (confirm("Apakah kamu yakin ingin menghapus data progres bacaan?")) {
                localStorage.removeItem(progresKey);
                tampilkanProgresBacaan();
                babAktifIndex = -1;
                muatDaftarBab();
                judulBabElement.textContent = "Silakan pilih bab untuk membaca";
                kontenNovelElement.innerHTML = "<p class='text-center text-muted'>Konten bab akan muncul di sini</p>";
                updateNavigasiBab();
            }
        }

        // --- Event Listener ---
        darkModeToggle.addEventListener('click', toggleDarkMode);
        prevBabBtn.addEventListener('click', () => {
    // Gulir otomatis ke atas halaman sebelum memuat bab berikutnya
    window.scrollTo({
        top: 0,
        behavior: 'smooth' // Animasi gulir halus
    });
    // Beri jeda sedikit agar animasi gulir selesai sebelum memuat bab baru
    setTimeout(() => {
        muatKontenBab(babAktifIndex - 1);
    }, 300); // Waktu jeda 300ms (sesuaikan jika perlu)
});
       
       
       
       
        nextBabBtn.addEventListener('click', () => {
    // Gulir otomatis ke atas halaman sebelum memuat bab berikutnya
    window.scrollTo({
        top: 0,
        behavior: 'smooth' // Animasi gulir halus
    });
    // Beri jeda sedikit agar animasi gulir selesai sebelum memuat bab baru
    setTimeout(() => {
        muatKontenBab(babAktifIndex + 1);
    }, 300); // Waktu jeda 300ms (sesuaikan jika perlu)
});
        searchBtn.addEventListener('click', () => cariKata(searchInput.value));
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') cariKata(searchInput.value); });
        
      //  clearSearchBtn.addEventListener('click', resetPencarian);
        
        resetProgresBtn.addEventListener('click', resetProgresBacaan);

        // --- Inisialisasi Halaman ---
        initDarkMode();
        muatDaftarBab();
        tampilkanProgresBacaan();
        updateNavigasiBab();
    </script>
