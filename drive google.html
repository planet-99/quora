<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDrive View - Public Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bg: #ffffff; --text: #212529; }
        @media (prefers-color-scheme: dark) {
            body { background: #121212; color: #e0e0e0; }
            .list-group-item { background: #1e1e1e; color: #eee; border-color: #333; }
            .list-group-item:hover { background: #2d2d2d; }
            .card { background: #1e1e1e; border: 1px solid #333; }
        }
        .item-icon { font-size: 1.2rem; margin-right: 15px; }
        #contentViewer { white-space: pre-wrap; font-family: monospace; background: #2d2d2d; color: #81c784; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="mb-4 text-center">
        <h3><i class="bi bi-google-drive text-primary"></i> GDrive Explorer</h3>
        <p class="text-muted small">Melihat folder publik via API</p>
    </header>

    <div class="input-group mb-3">
        <input type="text" id="folderIdInput" class="form-control" placeholder="Masukkan Folder ID (dari URL Google Drive)">
        <button class="btn btn-primary" onclick="startExplore()">Buka Folder</button>
    </div>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb p-2 bg-body-secondary rounded" id="gdriveBreadcrumb">
            <li class="breadcrumb-item">Home</li>
        </ol>
    </nav>

    <div id="loader" class="text-center d-none my-4"><div class="spinner-border text-primary"></div></div>
    
    <div class="list-group" id="gdriveItems">
        <div class="text-center p-5 opacity-50">Masukkan Folder ID untuk memulai</div>
    </div>

    <div id="viewerSection" class="d-none mt-3">
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <span id="openFileName">File.txt</span>
                <button class="btn btn-sm btn-close" onclick="closePreview()"></button>
            </div>
            <div class="card-body">
                <pre id="contentViewer"></pre>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyDF_lcG6IXbHNNyWa2sRGjj4yRIERRbvKk'; 
    let folderStack = []; // Menyimpan riwayat ID folder untuk fitur 'Back'

    async function fetchGDriveData(folderId) {
        if (!API_KEY || API_KEY.includes('PASTE')) {
            alert("Harap masukkan API Key Google Cloud Anda di dalam kode!");
            return;
        }

        toggleLoader(true);
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&key=${API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);
            renderItems(data.files, folderId);
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            toggleLoader(false);
        }
    }

    function renderItems(files, currentId) {
        const list = document.getElementById('gdriveItems');
        list.innerHTML = "";
        closePreview();

        // Tombol Back (Prev Folder Logic)
        if (folderStack.length > 0) {
            const backBtn = document.createElement('button');
            backBtn.className = "list-group-item list-group-item-action list-group-item-warning";
            backBtn.innerHTML = `<i class="bi bi-arrow-left"></i> Kembali ke Folder Sebelumnya`;
            backBtn.onclick = () => {
                folderStack.pop(); 
                const prevFolderId = folderStack.length > 0 ? folderStack[folderStack.length - 1] : document.getElementById('folderIdInput').value;
                fetchGDriveData(prevFolderId);
                if(folderStack.length === 0) folderStack = []; // Reset stack
            };
            list.appendChild(backBtn);
        }

        if (files.length === 0) {
            list.innerHTML += `<div class="p-4 text-center">Folder ini kosong atau tidak dapat diakses.</div>`;
        }

        files.forEach(file => {
            const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
            const item = document.createElement('button');
            item.className = "list-group-item list-group-item-action d-flex align-items-center";
            
            const icon = isFolder ? 'bi-folder-fill text-warning' : 'bi-file-earmark-text text-info';
            
            item.innerHTML = `
                <i class="bi ${icon} item-icon"></i>
                <span class="text-truncate">${file.name}</span>
            `;

            item.onclick = () => {
                if (isFolder) {
                    folderStack.push(currentId);
                    fetchGDriveData(file.id);
                } else {
                    previewFile(file.id, file.name);
                }
            };
            list.appendChild(item);
        });
    }

    async function previewFile(fileId, name) {
        // Karena GDrive API mengembalikan blob untuk konten file, 
        // kita perlu fetch dengan alt=media
        const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;
        
        toggleLoader(true);
        try {
            const res = await fetch(url);
            const text = await res.text();
            document.getElementById('gdriveItems').classList.add('d-none');
            document.getElementById('viewerSection').classList.remove('d-none');
            document.getElementById('openFileName').innerText = name;
            document.getElementById('contentViewer').innerText = text;
        } catch (err) {
            alert("Gagal membaca file. Pastikan file adalah teks publik.");
        } finally {
            toggleLoader(false);
        }
    }

    function startExplore() {
        const id = document.getElementById('folderIdInput').value;
        if (id) {
            folderStack = [];
            fetchGDriveData(id);
        }
    }

    function closePreview() {
        document.getElementById('gdriveItems').classList.remove('d-none');
        document.getElementById('viewerSection').classList.add('d-none');
    }

    function toggleLoader(show) { document.getElementById('loader').classList.toggle('d-none', !show); }
</script>

</body>
</html>
